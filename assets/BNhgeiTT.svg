<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2d2a24" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a7f6d"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff8400"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1440" height="920" fill="#faf6ee"/>

  <!-- Title -->
  <text x="48" y="52" font-size="30" font-weight="700" fill="#2d2a24">Clawd 11-Agent Orchestration Framework</text>
  <text x="48" y="80" font-size="16" fill="#5f5646">TypeScript, Telegram, Anthropic Agent SDK, SQLite</text>

  <!-- Legend -->
  <g>
    <rect x="1132" y="104" width="268" height="150" rx="12" fill="#ffffff" stroke="#dfd2bf" stroke-width="1.5"/>
    <text x="1152" y="132" font-size="13" font-weight="700" fill="#5f5646">LEGEND</text>
    <rect x="1152" y="146" width="16" height="16" rx="4" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
    <text x="1178" y="159" font-size="13" fill="#2d2a24">Agent / component</text>
    <rect x="1152" y="172" width="16" height="16" rx="4" fill="#ffe9cc" stroke="#ff8400" stroke-width="1.5"/>
    <text x="1178" y="185" font-size="13" fill="#2d2a24">Control / decision</text>
    <rect x="1152" y="198" width="16" height="16" rx="4" fill="#d6f0fb" stroke="#0086bb" stroke-width="1.5"/>
    <text x="1178" y="211" font-size="13" fill="#2d2a24">Memory / data</text>
    <rect x="1152" y="224" width="16" height="16" rx="4" fill="#2d2a24"/>
    <text x="1178" y="237" font-size="13" fill="#2d2a24">Terminal action</text>
  </g>

  <!-- Ingress -->
  <g filter="url(#soft)">
    <rect x="48" y="150" width="160" height="72" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="128" y="182" text-anchor="middle" font-size="15" font-weight="700" fill="#2d2a24">User message</text>
  <text x="128" y="202" text-anchor="middle" font-size="13" fill="#5f5646">Telegram</text>

  <!-- Router -->
  <g filter="url(#soft)">
    <rect x="430" y="118" width="380" height="212" rx="14" fill="#fffaf3" stroke="#ff8400" stroke-width="2.5"/>
  </g>
  <text x="620" y="148" text-anchor="middle" font-size="18" font-weight="700" fill="#2d2a24">4-Tier Intent-Dispatch Router</text>
  <g font-size="14" fill="#2d2a24">
    <rect x="450" y="162" width="340" height="34" rx="7" fill="#ffe9cc"/>
    <text x="466" y="184" font-size="14">1. Locked session agent</text>
    <rect x="450" y="202" width="340" height="34" rx="7" fill="#ffedd4"/>
    <text x="466" y="224">2. @mention prefix</text>
    <rect x="450" y="242" width="340" height="34" rx="7" fill="#fff1dc"/>
    <text x="466" y="264">3. Keyword salience score</text>
    <rect x="450" y="282" width="340" height="34" rx="7" fill="#fff6e8"/>
    <text x="466" y="304">4. Default fallback</text>
  </g>

  <!-- Memory -->
  <g filter="url(#soft)">
    <rect x="48" y="250" width="160" height="104" rx="10" fill="#d6f0fb" stroke="#0086bb" stroke-width="1.8"/>
  </g>
  <text x="128" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#06344a">Context &amp; Memory</text>
  <text x="128" y="310" text-anchor="middle" font-size="12.5" fill="#0a5578">SQLite</text>
  <text x="128" y="328" text-anchor="middle" font-size="12.5" fill="#0a5578">salience-scored</text>

  <!-- Agents header -->
  <text x="620" y="380" text-anchor="middle" font-size="16" font-weight="700" fill="#2d2a24">11 Specialist Personas</text>

  <!-- Agent grid -->
  <g font-size="14.5" font-weight="600" fill="#2d2a24">
    <!-- row 1 -->
    <g filter="url(#soft)"><rect x="180" y="396" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="280" y="431" text-anchor="middle">Builder</text>
    <g filter="url(#soft)"><rect x="404" y="396" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="504" y="431" text-anchor="middle">Scout</text>
    <g filter="url(#soft)"><rect x="628" y="396" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="728" y="431" text-anchor="middle">Catalyst</text>
    <g filter="url(#soft)"><rect x="852" y="396" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="952" y="431" text-anchor="middle">Lens</text>
    <!-- row 2 -->
    <g filter="url(#soft)"><rect x="180" y="480" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="280" y="515" text-anchor="middle">Gears</text>
    <g filter="url(#soft)"><rect x="404" y="480" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="504" y="515" text-anchor="middle">Sentinel</text>
    <g filter="url(#soft)"><rect x="628" y="480" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="728" y="515" text-anchor="middle">Pulse</text>
    <g filter="url(#soft)"><rect x="852" y="480" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="952" y="515" text-anchor="middle">Hunter</text>
    <!-- row 3 -->
    <g filter="url(#soft)"><rect x="292" y="564" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="392" y="599" text-anchor="middle">Counselor</text>
    <g filter="url(#soft)"><rect x="516" y="564" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="616" y="599" text-anchor="middle">Coach</text>
    <g filter="url(#soft)"><rect x="740" y="564" width="200" height="58" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
    <text x="840" y="599" text-anchor="middle">Shepherd</text>
  </g>

  <!-- Tool layer -->
  <g filter="url(#soft)">
    <rect x="180" y="672" width="760" height="60" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="560" y="708" text-anchor="middle" font-size="15.5" font-weight="700" fill="#2d2a24">Tool &amp; Command Layer  (~25 commands, MCP + workspace tools)</text>

  <!-- HITL gate -->
  <g filter="url(#soft)">
    <rect x="1000" y="664" width="392" height="76" rx="12" fill="#ffe9cc" stroke="#ff8400" stroke-width="2.5"/>
  </g>
  <text x="1196" y="694" text-anchor="middle" font-size="16" font-weight="700" fill="#2d2a24">Human-in-the-Loop Approval Gate</text>
  <text x="1196" y="716" text-anchor="middle" font-size="13" fill="#5f5646">manual approve before sensitive actions execute</text>

  <!-- Execute -->
  <g filter="url(#soft)">
    <rect x="1096" y="792" width="200" height="64" rx="10" fill="#2d2a24"/>
  </g>
  <text x="1196" y="830" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Execute Action</text>

  <!-- Edges -->
  <!-- user -> router -->
  <path d="M208,186 L424,214" fill="none" stroke="#8a7f6d" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- memory -> router -->
  <path d="M208,288 C300,270 360,252 424,238" fill="none" stroke="#0086bb" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- memory -> agents -->
  <path d="M140,354 C160,405 220,420 274,424" fill="none" stroke="#0086bb" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- router -> agents header -->
  <path d="M620,330 L620,372" fill="none" stroke="#8a7f6d" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- agents (row3) -> tool layer -->
  <path d="M392,622 L440,668" fill="none" stroke="#8a7f6d" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M616,622 L580,668" fill="none" stroke="#8a7f6d" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M840,622 L720,668" fill="none" stroke="#8a7f6d" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- tool layer -> HITL -->
  <path d="M940,702 L996,702" fill="none" stroke="#ff8400" stroke-width="2.2" marker-end="url(#arrowO)"/>
  <!-- HITL -> execute -->
  <path d="M1196,740 L1196,788" fill="none" stroke="#ff8400" stroke-width="2.2" marker-end="url(#arrowO)"/>
  <!-- feedback loop: execute -> memory -->
  <path d="M1096,824 C620,900 200,760 128,358" fill="none" stroke="#ff8400" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowO)"/>
  <rect x="548" y="856" width="344" height="30" rx="8" fill="#faf6ee"/>
  <text x="720" y="877" text-anchor="middle" font-size="14" font-weight="700" fill="#c96a00">Error / Feedback Learning Loop</text>
</svg>
