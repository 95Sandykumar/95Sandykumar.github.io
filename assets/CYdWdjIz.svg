<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2d2a24" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a7f6d"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff8400"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1440" height="920" fill="#faf6ee"/>

  <!-- Title -->
  <text x="48" y="52" font-size="30" font-weight="700" fill="#2d2a24">LLM Audit Engine: Multi-Model Comparison</text>
  <text x="48" y="80" font-size="16" fill="#5f5646">Python, FastAPI, OpenAI, LangChain</text>

  <!-- Legend -->
  <g>
    <rect x="1132" y="104" width="268" height="150" rx="12" fill="#ffffff" stroke="#dfd2bf" stroke-width="1.5"/>
    <text x="1152" y="132" font-size="13" font-weight="700" fill="#5f5646">LEGEND</text>
    <rect x="1152" y="146" width="16" height="16" rx="4" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
    <text x="1178" y="159" font-size="13" fill="#2d2a24">Agent / component</text>
    <rect x="1152" y="172" width="16" height="16" rx="4" fill="#ffe9cc" stroke="#ff8400" stroke-width="1.5"/>
    <text x="1178" y="185" font-size="13" fill="#2d2a24">Control / decision</text>
    <rect x="1152" y="198" width="16" height="16" rx="4" fill="#d6f0fb" stroke="#0086bb" stroke-width="1.5"/>
    <text x="1178" y="211" font-size="13" fill="#2d2a24">Memory / data</text>
    <rect x="1152" y="224" width="16" height="16" rx="4" fill="#2d2a24"/>
    <text x="1178" y="237" font-size="13" fill="#2d2a24">Terminal action</text>
  </g>

  <!-- Query ingress -->
  <g filter="url(#soft)">
    <rect x="48" y="346" width="160" height="72" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="128" y="378" text-anchor="middle" font-size="15" font-weight="700" fill="#2d2a24">Query</text>
  <text x="128" y="398" text-anchor="middle" font-size="13" fill="#5f5646">single entry point</text>

  <!-- Fan-out header -->
  <text x="395" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#2d2a24">Same Query, All Models</text>

  <!-- LLM nodes -->
  <g filter="url(#soft)"><rect x="300" y="188" width="190" height="64" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
  <text x="395" y="225" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2d2a24">LLM 1</text>

  <g filter="url(#soft)"><rect x="300" y="296" width="190" height="64" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
  <text x="395" y="333" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2d2a24">LLM 2</text>

  <g filter="url(#soft)"><rect x="300" y="404" width="190" height="64" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
  <text x="395" y="441" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2d2a24">LLM 3</text>

  <g filter="url(#soft)"><rect x="300" y="512" width="190" height="64" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/></g>
  <text x="395" y="549" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2d2a24">LLM N</text>

  <!-- Response collector -->
  <g filter="url(#soft)">
    <rect x="590" y="327" width="210" height="110" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="695" y="368" text-anchor="middle" font-size="15.5" font-weight="700" fill="#2d2a24">Response collector</text>
  <text x="695" y="390" text-anchor="middle" font-size="12.5" fill="#5f5646">aggregates outputs</text>
  <text x="695" y="408" text-anchor="middle" font-size="12.5" fill="#5f5646">from every model call</text>

  <!-- Disagreement & Drift Scoring -->
  <g filter="url(#soft)">
    <rect x="880" y="307" width="280" height="150" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="1020" y="350" text-anchor="middle" font-size="16" font-weight="700" fill="#2d2a24">Disagreement &amp;</text>
  <text x="1020" y="372" text-anchor="middle" font-size="16" font-weight="700" fill="#2d2a24">Drift Scoring</text>
  <text x="1020" y="398" text-anchor="middle" font-size="12.5" fill="#5f5646">compares outputs across models</text>
  <text x="1020" y="418" text-anchor="middle" font-size="12.5" fill="#5f5646">surfaces hallucination and drift</text>

  <!-- Audit report terminal -->
  <g filter="url(#soft)">
    <rect x="1240" y="344" width="160" height="76" rx="10" fill="#2d2a24"/>
  </g>
  <text x="1320" y="388" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Audit report</text>

  <!-- Per-call Failover -->
  <g filter="url(#soft)">
    <rect x="300" y="640" width="230" height="84" rx="12" fill="#ffe9cc" stroke="#ff8400" stroke-width="2.5"/>
  </g>
  <text x="415" y="668" text-anchor="middle" font-size="16" font-weight="700" fill="#2d2a24">Per-call Failover</text>
  <text x="415" y="690" text-anchor="middle" font-size="12.5" fill="#5f5646">intercepts a degraded</text>
  <text x="415" y="708" text-anchor="middle" font-size="12.5" fill="#5f5646">or failed model call</text>

  <!-- Backup model -->
  <g filter="url(#soft)">
    <rect x="590" y="647" width="210" height="70" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="695" y="678" text-anchor="middle" font-size="15" font-weight="700" fill="#2d2a24">Backup model</text>
  <text x="695" y="698" text-anchor="middle" font-size="12.5" fill="#5f5646">receives rerouted call</text>

  <!-- Edges: fan-out Query -> LLM nodes -->
  <path d="M208,382 C240,320 260,260 300,220" fill="none" stroke="#8a7f6d" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M208,382 C240,350 260,335 300,328" fill="none" stroke="#8a7f6d" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M208,382 C240,410 260,425 300,436" fill="none" stroke="#8a7f6d" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M208,382 C240,440 260,500 300,544" fill="none" stroke="#8a7f6d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM1, LLM3, LLM N -> Response collector -->
  <path d="M490,220 C540,260 560,300 590,350" fill="none" stroke="#8a7f6d" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M490,436 C530,422 560,416 590,410" fill="none" stroke="#8a7f6d" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M490,544 C540,500 560,465 590,430" fill="none" stroke="#8a7f6d" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- LLM2 -> Per-call Failover (degraded / failed call, dashed) -->
  <path d="M490,328 C540,400 540,550 415,640" fill="none" stroke="#ff8400" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrowO)"/>
  <text x="520" y="480" font-size="12" fill="#c96a00">degraded / failed</text>
  <text x="520" y="496" font-size="12" fill="#c96a00">model call</text>

  <!-- Per-call Failover -> Backup model (reroute, dashed) -->
  <path d="M530,682 L586,682" fill="none" stroke="#ff8400" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrowO)"/>

  <!-- Backup model -> Response collector (rejoins flow) -->
  <path d="M695,647 C650,560 600,500 620,441" fill="none" stroke="#8a7f6d" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Response collector -> Disagreement & Drift Scoring -->
  <path d="M800,382 L876,382" fill="none" stroke="#8a7f6d" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Disagreement & Drift Scoring -> Audit report -->
  <path d="M1160,382 L1236,382" fill="none" stroke="#8a7f6d" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Caption -->
  <rect x="300" y="760" width="500" height="34" rx="8" fill="#faf6ee"/>
  <text x="550" y="782" text-anchor="middle" font-size="14" font-weight="700" fill="#c96a00">Per-call failover: stays available under provider outage</text>
</svg>
