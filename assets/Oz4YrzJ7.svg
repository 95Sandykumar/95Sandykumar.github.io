<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 920" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2d2a24" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a7f6d"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0086bb"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff8400"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1440" height="920" fill="#faf6ee"/>

  <!-- Title -->
  <text x="48" y="52" font-size="30" font-weight="700" fill="#2d2a24">RAG Content Pipeline</text>
  <text x="48" y="80" font-size="16" fill="#5f5646">n8n orchestration, Apify scraping, Pinecone vector store, LLM style-validation gate</text>

  <!-- Legend -->
  <g>
    <rect x="1132" y="104" width="268" height="182" rx="12" fill="#ffffff" stroke="#dfd2bf" stroke-width="1.5"/>
    <text x="1152" y="132" font-size="13" font-weight="700" fill="#5f5646">LEGEND</text>
    <rect x="1152" y="146" width="16" height="16" rx="4" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
    <text x="1178" y="159" font-size="13" fill="#2d2a24">Pipeline component</text>
    <rect x="1152" y="172" width="16" height="16" rx="4" fill="#ffe9cc" stroke="#ff8400" stroke-width="1.5"/>
    <text x="1178" y="185" font-size="13" fill="#2d2a24">Control / gate</text>
    <rect x="1152" y="198" width="16" height="16" rx="4" fill="#d6f0fb" stroke="#0086bb" stroke-width="1.5"/>
    <text x="1178" y="211" font-size="13" fill="#2d2a24">Vector data store</text>
    <rect x="1152" y="224" width="16" height="16" rx="4" fill="#2d2a24"/>
    <text x="1178" y="237" font-size="13" fill="#2d2a24">Terminal output</text>
    <line x1="1152" y1="258" x2="1168" y2="258" stroke="#ff8400" stroke-width="2.2" stroke-dasharray="5 4"/>
    <text x="1178" y="263" font-size="13" fill="#2d2a24">Reject / requeue</text>
  </g>

  <!-- n8n orchestration band -->
  <rect x="24" y="340" width="1392" height="190" rx="20" fill="#fff8ec" stroke="#e8dcc4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="368" font-size="14" font-weight="700" fill="#c96a00">N8N ORCHESTRATION</text>
  <text x="48" y="387" font-size="12.5" fill="#5f5646">trigger to scrape to embed to store to retrieve to validate, one workflow</text>

  <!-- N1 n8n trigger -->
  <g filter="url(#soft)">
    <rect x="40" y="420" width="170" height="90" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="125" y="458" text-anchor="middle" font-size="14" font-weight="700" fill="#2d2a24">n8n Trigger</text>
  <text x="125" y="480" text-anchor="middle" font-size="12" fill="#5f5646">schedule / webhook</text>

  <!-- N2 Apify -->
  <g filter="url(#soft)">
    <rect x="278" y="420" width="170" height="90" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="363" y="458" text-anchor="middle" font-size="14" font-weight="700" fill="#2d2a24">Apify</text>
  <text x="363" y="480" text-anchor="middle" font-size="12" fill="#5f5646">automated web scraping</text>

  <!-- N3 Chunk + embed -->
  <g filter="url(#soft)">
    <rect x="516" y="420" width="170" height="90" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="601" y="458" text-anchor="middle" font-size="14" font-weight="700" fill="#2d2a24">Chunk + Embed</text>
  <text x="601" y="480" text-anchor="middle" font-size="12" fill="#5f5646">vector embeddings</text>

  <!-- N4 Pinecone (data) -->
  <g filter="url(#soft)">
    <rect x="754" y="420" width="170" height="90" rx="10" fill="#d6f0fb" stroke="#0086bb" stroke-width="1.8"/>
  </g>
  <text x="839" y="458" text-anchor="middle" font-size="14" font-weight="700" fill="#06344a">Pinecone</text>
  <text x="839" y="480" text-anchor="middle" font-size="12" fill="#0a5578">vector store</text>

  <!-- N5 Retrieval -->
  <g filter="url(#soft)">
    <rect x="992" y="420" width="170" height="90" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="1077" y="458" text-anchor="middle" font-size="14" font-weight="700" fill="#2d2a24">Retrieval</text>
  <text x="1077" y="480" text-anchor="middle" font-size="12" fill="#5f5646">query pipeline</text>

  <!-- N6 LLM style-validation scoring gate (control) -->
  <g filter="url(#soft)">
    <rect x="1230" y="420" width="170" height="90" rx="14" fill="#ffe9cc" stroke="#ff8400" stroke-width="2.5"/>
  </g>
  <text x="1315" y="454" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2d2a24">LLM Scoring Gate</text>
  <text x="1315" y="474" text-anchor="middle" font-size="12" fill="#2d2a24">style-validation</text>
  <text x="1315" y="493" text-anchor="middle" font-size="12" fill="#2d2a24">pass / fail</text>

  <!-- Publish / output (terminal) -->
  <g filter="url(#soft)">
    <rect x="1180" y="650" width="200" height="64" rx="10" fill="#2d2a24"/>
  </g>
  <text x="1280" y="688" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Publish / Output</text>

  <!-- Rejected / requeue -->
  <g filter="url(#soft)">
    <rect x="900" y="650" width="220" height="64" rx="10" fill="#ffffff" stroke="#2d2a24" stroke-width="1.5"/>
  </g>
  <text x="1010" y="676" text-anchor="middle" font-size="14" font-weight="700" fill="#2d2a24">Rejected</text>
  <text x="1010" y="696" text-anchor="middle" font-size="12" fill="#5f5646">requeue for reprocessing</text>

  <!-- Edges -->
  <!-- N1 -> N2 -->
  <path d="M210,465 L278,465" fill="none" stroke="#8a7f6d" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- N2 -> N3 -->
  <path d="M448,465 L516,465" fill="none" stroke="#8a7f6d" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- N3 -> N4 (into data store) -->
  <path d="M686,465 L754,465" fill="none" stroke="#0086bb" stroke-width="2" marker-end="url(#arrowB)"/>
  <!-- N4 -> N5 (out of data store) -->
  <path d="M924,465 L992,465" fill="none" stroke="#0086bb" stroke-width="2" marker-end="url(#arrowB)"/>
  <!-- N5 -> N6 (into gate) -->
  <path d="M1162,465 L1230,465" fill="none" stroke="#ff8400" stroke-width="2.2" marker-end="url(#arrowO)"/>

  <!-- Gate -> Publish (pass) -->
  <path d="M1320,510 C1305,570 1290,610 1283,646" fill="none" stroke="#ff8400" stroke-width="2.2" marker-end="url(#arrowO)"/>
  <text x="1345" y="585" font-size="12.5" font-weight="700" fill="#c96a00">pass</text>

  <!-- Gate -> Rejected (fail, dashed) -->
  <path d="M1235,510 C1150,560 1080,600 1020,646" fill="none" stroke="#ff8400" stroke-width="2.2" stroke-dasharray="7 6" marker-end="url(#arrowO)"/>
  <text x="1115" y="585" font-size="12.5" font-weight="700" fill="#c96a00">fail</text>

  <!-- Rejected -> requeue back into n8n trigger (dashed feedback loop) -->
  <path d="M1005,714 C900,830 300,830 128,520" fill="none" stroke="#ff8400" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrowO)"/>
  <rect x="548" y="856" width="344" height="30" rx="8" fill="#faf6ee"/>
  <text x="720" y="877" text-anchor="middle" font-size="14" font-weight="700" fill="#c96a00">Reject / Requeue Feedback Loop</text>
</svg>
